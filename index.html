<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fbf8ff">
<title>คันจิ แฟลชการ์ด · N5 / N4</title>
<!-- PWA / iOS home-screen app -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="คันจิ N5">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --font: 'Zen Maru Gothic','Noto Sans Thai','Noto Sans JP',sans-serif; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: linear-gradient(155deg,#f1ecff 0%,#ffeef6 55%,#eafaf4 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  /* the app "screen": 390-wide, framed on desktop, full-bleed on phones */
  #screen {
    position: relative;
    width: 390px; height: 844px;
    max-width: 100vw; max-height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg,#fbf8ff 0%,#fdf6fb 100%);
    border-radius: 34px;
    box-shadow: 0 40px 80px -24px rgba(90,70,150,.45), 0 12px 30px -12px rgba(90,70,150,.3);
  }
  @media (max-width: 440px) {
    body { background: linear-gradient(180deg,#fbf8ff,#fdf6fb); }
    /* full-bleed; safe-area padding keeps content clear of the notch & home indicator
       (padding on a positioned box insets its position:absolute children) */
    #screen { width: 100vw; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  }
  a { color: #7c6bd6; }
  .scroll::-webkit-scrollbar { width: 0; height: 0; }
  .scroll { -ms-overflow-style: none; scrollbar-width: none; }
  button { font-family: inherit; }
  @keyframes jpfcPop { 0% { transform: scale(.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes jpfcFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .pop { animation: jpfcPop .25s ease both; }
  /* settings sheet */
  #sheet-wrap { position: absolute; inset: 0; z-index: 60; display: none; }
  #sheet-wrap.on { display: block; }
  #sheet-bg { position: absolute; inset: 0; background: rgba(40,30,60,.28); }
  #sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: #fff; border-radius: 26px 26px 0 0; padding: 20px 22px 26px;
    box-shadow: 0 -12px 40px -18px rgba(90,70,150,.5);
  }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f4eefb; }
  .row:last-child { border-bottom: none; }
  .sw { width: 46px; height: 27px; border-radius: 20px; background: #e6dff5; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
  .sw.on { background: #7c6bd6; }
  .sw::after { content:''; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%; background:#fff; transition:left .2s; box-shadow:0 2px 4px rgba(0,0,0,.2); }
  .sw.on::after { left: 22px; }
  input[type=range] { accent-color: #7c6bd6; }
</style>
</head>
<body>
<div id="screen"><div id="app" class="scroll" style="position:absolute; inset:0; overflow-y:auto;"></div>
  <!-- settings sheet -->
  <div id="sheet-wrap">
    <div id="sheet-bg"></div>
    <div id="sheet">
      <div style="width:40px;height:5px;border-radius:3px;background:#e6dff5;margin:0 auto 14px;"></div>
      <div style="font-size:17px;font-weight:700;color:#443c54;margin-bottom:6px;">ตั้งค่า</div>
      <div class="row">
        <div><div style="font-size:14px;font-weight:600;color:#443c54;">แสดงโรมาจิ</div><div style="font-size:11px;color:#a79fb6;">โชว์คำอ่านโรมันบนการ์ด</div></div>
        <div id="sw-romaji" class="sw"></div>
      </div>
      <div class="row">
        <div><div style="font-size:14px;font-weight:600;color:#443c54;">เล่นเสียงอัตโนมัติ</div><div style="font-size:11px;color:#a79fb6;">อ่านคำให้ฟังเมื่อขึ้นการ์ดใหม่</div></div>
        <div id="sw-autoplay" class="sw"></div>
      </div>
      <div class="row" style="display:block;">
        <div style="display:flex;justify-content:space-between;"><div style="font-size:14px;font-weight:600;color:#443c54;">ความเร็วเสียง</div><div id="rate-val" style="font-size:13px;font-weight:700;color:#7c6bd6;">0.9×</div></div>
        <input id="rate" type="range" min="0.6" max="1.1" step="0.05" style="width:100%;margin-top:10px;">
      </div>
      <div class="row" style="display:block;">
        <div style="display:flex;justify-content:space-between;"><div style="font-size:14px;font-weight:600;color:#443c54;">จำนวนคำต่อรอบ</div><div id="ssize-val" style="font-size:13px;font-weight:700;color:#7c6bd6;">20</div></div>
        <input id="ssize" type="range" min="5" max="40" step="5" style="width:100%;margin-top:10px;">
      </div>
      <button id="sheet-close" style="width:100%;border:none;background:#f2eefb;color:#7c6bd6;font-size:15px;font-weight:700;padding:14px;border-radius:16px;margin-top:16px;cursor:pointer;">เสร็จสิ้น</button>
    </div>
  </div>
</div>

<script src="./words.js"></script>
<script src="./questions.js"></script>
<script>
(function () {
  "use strict";
  const WORDS = (window.JPFC_WORDS || []).slice();
  const DECKS = [
    { id:'n5',    tag:'ระดับ N5', name:'N5 พื้นฐาน',      glyph:'初', color:'#ff6f9c', soft:'#ffe6ef', desc:'คำศัพท์เริ่มต้นที่ใช้บ่อยที่สุด', belongs:w=>w.lv==='N5' },
    { id:'n4',    tag:'ระดับ N4', name:'N4 ก้าวหน้า',     glyph:'四', color:'#7c6bd6', soft:'#ece7fb', desc:'ต่อยอดสู่ระดับกลาง',           belongs:w=>w.lv==='N4' },
    { id:'daily', tag:'หมวดหมู่', name:'ชีวิตประจำวัน',    glyph:'日', color:'#34b183', soft:'#daf4ea', desc:'คำที่เจอในชีวิตประจำวัน',        belongs:w=>w.daily },
  ];
  const CIRC = 326.7; // 2*pi*52
  const $ = id => document.getElementById(id);
  const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  // ---------- persistence ----------
  const K = { srs:'jpfc_srs_v1', streak:'jpfc_streak_v1', lastday:'jpfc_lastday_v1', settings:'jpfc_settings_v1' };
  function load(k, def) { try { const v = JSON.parse(localStorage.getItem(k)); return v==null?def:v; } catch(e){ return def; } }
  function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }

  const settings = Object.assign({ showRomaji:true, autoplay:false, ttsRate:0.9, sessionSize:20 }, load(K.settings, {}));
  let srs = load(K.srs, null);
  if (!srs || typeof srs !== 'object') { srs = { 0:5, 1:5, 6:5, 3:3, 5:3, 2:2 }; } // first-run seed
  let streak = load(K.streak, 0);

  // ---------- app state ----------
  const st = {
    screen:'home', deckId:null,
    queue:[], pos:0, revealed:false,
    results:{ known:[], unknown:[] },
    session:{ learned:0, known:0, unknown:0, unknownList:[] },
  };
  // drag refs
  let dragging=false, startX=0, startY=0, curDx=0, exiting=false;

  // ---------- TTS ----------
  let jaVoice = null;
  function pickVoice() {
    const vs = (window.speechSynthesis && speechSynthesis.getVoices()) || [];
    jaVoice = vs.find(v => /ja(-|_)?JP/i.test(v.lang) || v.lang === 'ja') || null;
  }
  if (window.speechSynthesis) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
  function speak(text, opts) {
    opts = opts || {};
    try {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = opts.rate != null ? opts.rate : settings.ttsRate;
      u.pitch = opts.pitch != null ? opts.pitch : 1;
      if (jaVoice) u.voice = jaVoice;
      speechSynthesis.speak(u);
    } catch(e){}
  }

  // ---------- SRS helpers ----------
  const box = i => srs[i] || 0;
  const isMastered = i => box(i) >= 5;
  function deckItems(deck){ const out=[]; WORDS.forEach((w,i)=>{ if(deck.belongs(w)) out.push(i); }); return out; }
  function deckStats(deck){ const it=deckItems(deck); return { total:it.length, mastered:it.filter(isMastered).length }; }

  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  // ---------- navigation / session ----------
  function go(screen){ st.screen = screen; render(); }

  function startDeck(deckId){
    const deck = DECKS.find(d=>d.id===deckId); if(!deck) return;
    let items = deckItems(deck);
    // prioritise least-known (due first): sort by box asc, random tiebreak, then cap to sessionSize
    items = items.map(i=>({i, b:box(i), r:Math.random()}))
                 .sort((a,b)=> a.b-b.b || a.r-b.r)
                 .slice(0, Math.min(settings.sessionSize, items.length))
                 .map(o=>o.i);
    shuffle(items);
    exiting=false; curDx=0;
    st.deckId=deckId; st.queue=items; st.pos=0; st.results={known:[],unknown:[]}; st.revealed=false;
    go('study');
    resetCard(true);
  }

  function reveal(){ st.revealed = true; render(); }

  function commit(known){
    const idx = st.queue[st.pos];
    const cur = box(idx);
    srs[idx] = known ? Math.min(5, cur+1) : Math.max(1, cur-1);
    (known ? st.results.known : st.results.unknown).push(idx);
    save(K.srs, srs);
    const next = st.pos + 1;
    if (next >= st.queue.length){
      const today = new Date().toDateString();
      if (load(K.lastday,null) !== today){ streak = streak + 1; save(K.lastday, today); save(K.streak, streak); }
      st.session = { learned:st.queue.length, known:st.results.known.length, unknown:st.results.unknown.length, unknownList:st.results.unknown.slice() };
      exiting=false;
      go('summary');
    } else {
      st.pos = next; exiting=false; st.revealed=false;
      go('study');
      resetCard(true);
    }
  }

  function reviewAgain(){
    const q = st.session.unknownList.slice();
    if (!q.length){ go('home'); return; }
    shuffle(q); exiting=false;
    st.queue=q; st.pos=0; st.results={known:[],unknown:[]}; st.revealed=false;
    go('study'); resetCard(true);
  }

  // ---------- swipe mechanics ----------
  function curWord(){ return WORDS[st.queue[st.pos]] || WORDS[0]; }
  function cardEl(){ return $('card'); }
  function applyDrag(dx,dy){
    const c=cardEl(); if(!c) return;
    c.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+(dx/22)+'deg)';
    const like=$('like'), nope=$('nope');
    if(like) like.style.opacity = Math.max(0,Math.min(1, dx/110));
    if(nope) nope.style.opacity = Math.max(0,Math.min(1, -dx/110));
  }
  function resetCard(autoplay){
    const c=cardEl();
    if(c){ c.style.transition='none'; c.style.transform='translate(0,0) rotate(0deg)'; c.style.opacity='1'; c.scrollTop=0;
      requestAnimationFrame(()=>{ const cc=cardEl(); if(cc) cc.style.transition='transform .28s ease, opacity .28s ease'; }); }
    const like=$('like'), nope=$('nope'); if(like) like.style.opacity='0'; if(nope) nope.style.opacity='0';
    if(settings.autoplay && autoplay){ const w=curWord(); if(w) setTimeout(()=>speak(w.k),220); }
  }
  function fly(known){
    if(exiting || !st.revealed) return; exiting=true;   // rating gated on reveal
    const c=cardEl();
    if(c){ c.style.transition='transform .32s ease, opacity .32s ease';
      c.style.transform='translate('+(known?520:-520)+'px,-24px) rotate('+(known?16:-16)+'deg)'; c.style.opacity='0'; }
    const like=$('like'), nope=$('nope');
    if(like) like.style.opacity=known?'1':'0'; if(nope) nope.style.opacity=known?'0':'1';
    setTimeout(()=>commit(known), 300);
  }
  function bindCard(){
    const c=cardEl(); if(!c) return;
    c.addEventListener('pointerdown', e=>{ if(exiting) return; dragging=true; startX=e.clientX; startY=e.clientY; curDx=0; c.style.transition='none'; try{c.setPointerCapture(e.pointerId);}catch(x){} });
    c.addEventListener('pointermove', e=>{ if(!dragging) return; const dx=e.clientX-startX, dy=(e.clientY-startY)*0.22; curDx=dx; applyDrag(dx,dy); });
    const up=()=>{ if(!dragging) return; dragging=false; const dx=curDx||0;
      if(st.revealed && dx>110) fly(true);
      else if(st.revealed && dx<-110) fly(false);
      else { // not revealed, or below threshold -> spring back (no commit)
        c.style.transition='transform .28s cubic-bezier(.2,.8,.2,1)'; c.style.transform='translate(0,0) rotate(0deg)';
        const like=$('like'),nope=$('nope'); if(like)like.style.opacity='0'; if(nope)nope.style.opacity='0'; }
      curDx=0; };
    c.addEventListener('pointerup', up); c.addEventListener('pointercancel', up);
  }

  // ---------- settings sheet ----------
  function openSheet(){
    $('sw-romaji').classList.toggle('on', settings.showRomaji);
    $('sw-autoplay').classList.toggle('on', settings.autoplay);
    $('rate').value = settings.ttsRate; $('rate-val').textContent = settings.ttsRate.toFixed(2).replace(/0$/,'')+'×';
    $('ssize').value = settings.sessionSize; $('ssize-val').textContent = settings.sessionSize;
    $('sheet-wrap').classList.add('on');
  }
  function closeSheet(){ $('sheet-wrap').classList.remove('on'); }
  $('sheet-bg').onclick = closeSheet; $('sheet-close').onclick = closeSheet;
  $('sw-romaji').onclick = function(){ settings.showRomaji=!settings.showRomaji; this.classList.toggle('on',settings.showRomaji); save(K.settings,settings); if(st.screen==='study') render(); };
  $('sw-autoplay').onclick = function(){ settings.autoplay=!settings.autoplay; this.classList.toggle('on',settings.autoplay); save(K.settings,settings); };
  $('rate').oninput = function(){ settings.ttsRate=parseFloat(this.value); $('rate-val').textContent=settings.ttsRate.toFixed(2).replace(/0$/,'')+'×'; save(K.settings,settings); };
  $('ssize').oninput = function(){ settings.sessionSize=parseInt(this.value,10); $('ssize-val').textContent=settings.sessionSize; save(K.settings,settings); };

  // ---------- icons ----------
  const spk = (s)=>`<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"></path><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path></svg>`;

  // ---------- views ----------
  function viewHome(){
    const total = WORDS.length;
    const mastered = WORDS.filter((w,i)=>isMastered(i)).length;
    const pct = total ? Math.round(mastered/total*100) : 0;
    const ring = CIRC*(1 - (total?mastered/total:0));
    const deckRows = DECKS.map(d=>{
      const s=deckStats(d); const p=s.total?Math.round(s.mastered/s.total*100):0;
      return `<div class="deck-row" data-deck="${d.id}" style="cursor:pointer;background:#fff;border:1px solid #f1ebfb;border-radius:20px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:12px;box-shadow:0 8px 20px -16px rgba(124,107,214,.5);">
        <div style="width:50px;height:50px;border-radius:15px;background:${d.soft};color:${d.color};display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;flex-shrink:0;">${d.glyph}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:700;color:#443c54;">${d.name}</div>
          <div style="font-size:11px;color:#a79fb6;margin:3px 0 7px;">จำได้ ${s.mastered} / ${s.total} คำ</div>
          <div style="height:6px;background:#f2eefb;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${p}%;background:${d.color};border-radius:4px;transition:width .4s ease;"></div></div>
        </div>
        <div style="color:#cfc7e0;font-size:22px;font-weight:700;">›</div>
      </div>`;
    }).join('');
    return `<div class="scroll" style="position:absolute;inset:0;overflow-y:auto;padding:42px 22px 40px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
        <div>
          <div style="font-size:13px;color:#a79fb6;font-weight:500;">こんにちは、ようこそ</div>
          <div style="font-size:23px;font-weight:700;color:#443c54;line-height:1.2;">มาเรียนคันจิกันเถอะ</div>
        </div>
        <div id="gear" style="cursor:pointer;width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#ffd1e3,#d9ccff);display:flex;align-items:center;justify-content:center;color:#7c6bd6;">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div>
      </div>
      <div style="background:#fff;border-radius:28px;padding:24px;box-shadow:0 14px 30px -18px rgba(124,107,214,.45);border:1px solid #f1ebfb;display:flex;align-items:center;gap:20px;margin-bottom:18px;">
        <div style="position:relative;width:104px;height:104px;flex-shrink:0;">
          <svg viewBox="0 0 128 128" width="104" height="104">
            <circle cx="64" cy="64" r="52" fill="none" stroke="#f0ebfa" stroke-width="13"></circle>
            <circle cx="64" cy="64" r="52" fill="none" stroke="#7c6bd6" stroke-width="13" stroke-linecap="round" stroke-dasharray="${CIRC}" stroke-dashoffset="${ring}" transform="rotate(-90 64 64)" style="transition:stroke-dashoffset .6s ease;"></circle>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <span style="font-size:26px;font-weight:900;color:#443c54;line-height:1;">${pct}<span style="font-size:13px;">%</span></span>
            <span style="font-size:10px;color:#a79fb6;margin-top:2px;">จำได้แล้ว</span>
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;color:#6b6480;font-weight:500;margin-bottom:12px;">คุณจำได้แล้ว <b style="color:#7c6bd6;">${mastered}</b> จาก ${total} คำ</div>
          <div style="display:flex;gap:10px;">
            <div style="flex:1;background:#fff2f6;border-radius:14px;padding:8px 10px;">
              <div style="font-size:19px;font-weight:800;color:#ff6f9c;">${streak}</div>
              <div style="font-size:10px;color:#c99;font-weight:600;">วันต่อเนื่อง</div>
            </div>
            <div style="flex:1;background:#eefaf4;border-radius:14px;padding:8px 10px;">
              <div style="font-size:19px;font-weight:800;color:#34b183;">${total-mastered}</div>
              <div style="font-size:10px;color:#7dbfa4;font-weight:600;">รอทบทวน</div>
            </div>
          </div>
        </div>
      </div>
      <div id="cta" style="cursor:pointer;background:linear-gradient(135deg,#8a76e8,#b58fe6);border-radius:22px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 16px 28px -14px rgba(138,118,232,.75);margin-bottom:14px;">
        <div><div style="font-size:17px;font-weight:700;color:#fff;">เริ่มเรียนวันนี้</div><div style="font-size:12px;color:#ece4ff;">ปัดการ์ดเพื่อทบทวนคำศัพท์</div></div>
        <div style="width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;">→</div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:26px;">

  // ============================================================
  //  Sequential TTS (listening dialogues / compare playback)
  // ============================================================
  let seqTimer = null;
  function cancelSeq(){ if(seqTimer){ clearTimeout(seqTimer); seqTimer=null; } try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){} }
  function speakSeq(items, rate){
    if(!window.speechSynthesis) return; cancelSeq();
    let i=0;
    (function next(){
      if(i>=items.length) return;
      const it=items[i++];
      try{
        const u=new SpeechSynthesisUtterance(it.text);
        u.lang='ja-JP'; u.rate=rate||0.9; u.pitch=it.pitch||1;
        if(jaVoice) u.voice=jaVoice;
        u.onend=()=>{ seqTimer=setTimeout(next,350); };
        u.onerror=()=>{ seqTimer=setTimeout(next,350); };
        speechSynthesis.speak(u);
      }catch(e){ seqTimer=setTimeout(next,350); }
    })();
  }

  // ============================================================
  //  EXAM MODE  (JLPT-style)
  // ============================================================
  const EXAM = window.JPFC_EXAM || {};
  const EXAM_LEVELS = ['N5','N4','N3','N2','N1'];
  const PART_META = { 1:{jp:'文字・語彙',th:'ตัวอักษร・คำศัพท์'}, 2:{jp:'文法・読解',th:'ไวยากรณ์・การอ่าน'}, 3:{jp:'聴解',th:'การฟัง'} };
  const EXAM_TIME = { 15:10, 30:20, 45:30 };  // questions -> minutes
  let examTimerId = null;
  const ex = { lv:'N5', items:[], pos:0, answers:[], sel:-1, deadline:0, result:null };

  // shuffle a question's choices and remap the answer index
  function prepQuestion(q){ const o=q.choices.map((_,i)=>i); shuffle(o); return Object.assign({},q,{ choices:o.map(i=>q.choices[i]), a:o.indexOf(q.a) }); }

  function sampleExam(lv,n){
    const bank=(EXAM[lv]||[]).slice(); const byPart={1:[],2:[],3:[]};
    bank.forEach(q=>{ if(byPart[q.part]) byPart[q.part].push(q); });
    [1,2,3].forEach(p=>shuffle(byPart[p]));                 // shuffle within each part
    const want={1:Math.round(n*0.40), 2:Math.round(n*0.33)}; // ~40% / ~33% / rest
    want[3]=Math.max(0, n-want[1]-want[2]);
    const take={}; let short=0;
    [1,2,3].forEach(p=>{ take[p]=Math.min(want[p], byPart[p].length); short+=want[p]-take[p]; });
    while(short>0){ let moved=false; for(const p of [1,2,3]){ if(short<=0) break; if(take[p]<byPart[p].length){ take[p]++; short--; moved=true; } } if(!moved) break; } // fill shortfall from parts that have spare
    const out=[]; [1,2,3].forEach(p=>{ for(let i=0;i<take[p];i++) out.push(prepQuestion(byPart[p][i])); }); // parts in order 1->2->3
    return out;
  }
  function examHistory(){ return load('jpfc_exam_history', []); }
  function fmtTime(ms){ const s=Math.max(0,Math.ceil(ms/1000)); const m=Math.floor(s/60); const ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
  function stopExamTimer(){ if(examTimerId){ clearInterval(examTimerId); examTimerId=null; } }
  function startExamTimer(){
    stopExamTimer();
    examTimerId=setInterval(()=>{
      const left=ex.deadline-Date.now(); const el=$('exam-timer');
      if(el){ el.textContent=fmtTime(left); if(left<=30000){ el.style.color='#ff6f9c'; el.style.background='#fff1f5'; } }
      if(left<=0){ stopExamTimer(); finishExam(); }
    },250);
  }
  function startExam(n){
    const items=sampleExam(ex.lv,n);
    if(!items.length){ alert('ยังไม่มีข้อสอบสำหรับระดับนี้'); return; }
    ex.items=items; ex.pos=0; ex.answers=items.map(()=>-1); ex.sel=-1; ex.result=null; ex.fb=false;
    const mins=EXAM_TIME[n]||Math.round(n*2/3); ex.deadline=Date.now()+mins*60000;
    startExamTimer(); go('exam-q');
  }
  function selectChoice(i){ if(ex.fb) return; ex.sel=i; render(); }
  function nextExam(){
    if(!ex.fb){                                      // phase 1: commit + reveal feedback (may be -1 = skipped)
      ex.answers[ex.pos]=ex.sel; ex.fb=true; render(); return;
    }
    ex.fb=false;                                     // phase 2: advance
    if(ex.pos+1>=ex.items.length){ finishExam(); return; }
    ex.pos++; ex.sel=ex.answers[ex.pos]; render();
  }
  function finishExam(){
    stopExamTimer(); cancelSeq();
    if(ex.pos<ex.items.length && ex.answers[ex.pos]===-1) ex.answers[ex.pos]=ex.sel; // capture current on auto-submit
    const items=ex.items, per={1:{c:0,t:0},2:{c:0,t:0},3:{c:0,t:0}}; let correct=0;
    items.forEach((q,i)=>{ per[q.part].t++; if(ex.answers[i]===q.a){ correct++; per[q.part].c++; } });
    ex.result={ correct, total:items.length, pct: items.length?Math.round(correct/items.length*100):0, per,
      wrong: items.map((q,i)=>({q,i,sel:ex.answers[i]})).filter(o=>o.sel!==o.q.a) };
    const h=examHistory();
    h.push({ ts:Date.now(), lv:ex.lv, n:items.length, correct, perPart:[per[1].c+'/'+per[1].t, per[2].c+'/'+per[2].t, per[3].c+'/'+per[3].t] });
    save('jpfc_exam_history', h);
    go('exam-result');
  }
  function playListening(q){
    const items=(q.script||'').split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{
      const m=/^([MFＭＦmf])\s*[:：]\s*(.*)$/.exec(line);
      if(m){ const sp=m[1].toUpperCase(); return { text:m[2], pitch: (sp==='M'||sp==='Ｍ')?0.7:1.4 }; }
      return { text:line, pitch:1.0 };
    });
    items.push({ text:q.q, pitch:1.0 });
    speakSeq(items, 0.9);
  }
  function highlightQ(q,target){
    let h=esc(q);
    if(target){ const t=esc(target); if(t && h.indexOf(t)>=0) h=h.split(t).join('<span style="color:#7c6bd6;font-weight:800;border-bottom:2px solid #7c6bd6;padding-bottom:1px;">'+t+'</span>'); }
    h=h.split('★').join('<span style="display:inline-block;min-width:24px;text-align:center;color:#ff6f9c;font-weight:800;">★</span>');
    return h;

  // ============================================================
  //  SHADOWING MODE
  // ============================================================
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let SHADOW_ITEMS = null;
  function shadowItems(){
    if(SHADOW_ITEMS) return SHADOW_ITEMS;
    const seen={}, out=[];
    WORDS.forEach(w=>{ if(w.ej && !seen[w.ej]){ seen[w.ej]=1; out.push({ ej:w.ej, er:w.er, et:w.et, k:w.k, th:w.th }); } });
    SHADOW_ITEMS=out; return out;
  }
  const shadowScores = load('jpfc_shadow_scores', {});
  let shadowRate = load('jpfc_shadow_rate', 0.8);
  const sh = { queue:[], pos:0, showReading:false, showThai:false, recogText:null, recogSim:null };
  const rec = { mr:null, chunks:[], url:null, stream:null, on:false };

  function shadowCur(){ return sh.queue[sh.pos] || null; }
  function startShadow(){
    const items=shadowItems().slice(); shuffle(items);
    sh.queue=items; sh.pos=0; sh.showReading=false; sh.showThai=false; sh.recogText=null; sh.recogSim=null;
    clearRec(); go('shadow');
  }
  function clearRec(){ if(rec.url){ try{ URL.revokeObjectURL(rec.url); }catch(e){} rec.url=null; } rec.chunks=[]; }
  function stopMic(){ if(rec.stream){ try{ rec.stream.getTracks().forEach(t=>t.stop()); }catch(e){} rec.stream=null; } }
  function stopShadow(){ if(rec.on){ try{ rec.mr && rec.mr.state!=='inactive' && rec.mr.stop(); }catch(e){} } rec.on=false; stopMic(); clearRec(); cancelSeq(); try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){} }

  function toggleRecord(){
    if(rec.on){ try{ rec.mr && rec.mr.state!=='inactive' && rec.mr.stop(); }catch(e){} return; }
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder)){
      alert('อุปกรณ์นี้ไม่รองรับการอัดเสียง แต่ยังฝึกฟังและพูดตามได้ตามปกติ'); return;
    }
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      clearRec(); rec.stream=stream;
      let mr; try{ mr=new MediaRecorder(stream); }catch(e){ mr=new MediaRecorder(stream); }
      rec.mr=mr; rec.chunks=[];
      mr.ondataavailable=e=>{ if(e.data && e.data.size) rec.chunks.push(e.data); };
      mr.onstop=()=>{
        try{ const blob=new Blob(rec.chunks, {type:(rec.chunks[0]&&rec.chunks[0].type)||'audio/webm'});
          if(rec.url){ try{ URL.revokeObjectURL(rec.url); }catch(e){} }
          rec.url=URL.createObjectURL(blob);
        }catch(e){}
        rec.on=false; stopMic(); if(st.screen==='shadow') render();
      };
      mr.start(); rec.on=true; if(st.screen==='shadow') render();
    }).catch(()=>{ alert('เข้าถึงไมโครโฟนไม่ได้ (อาจถูกปฏิเสธสิทธิ์) — ยังฝึกฟังและพูดตามได้ตามปกติ'); rec.on=false; stopMic(); if(st.screen==='shadow') render(); });
  }
  function playMine(){ if(!rec.url) return; try{ new Audio(rec.url).play().catch(()=>{}); }catch(e){} }
  function playCompare(){
    const it=shadowCur(); if(!it) return;
    if(window.speechSynthesis){
      speechSynthesis.cancel();
      try{ const u=new SpeechSynthesisUtterance(it.ej); u.lang='ja-JP'; u.rate=shadowRate; if(jaVoice)u.voice=jaVoice;
        u.onend=()=>{ if(rec.url){ try{ new Audio(rec.url).play().catch(()=>{}); }catch(e){} } };
        speechSynthesis.speak(u); }catch(e){}
    } else if(rec.url){ try{ new Audio(rec.url).play().catch(()=>{}); }catch(e){} }
  }
  function rateShadow(r){
    const it=shadowCur(); if(!it) return;
    shadowScores[it.ej]=r; save('jpfc_shadow_scores', shadowScores);
    stopShadow(); // release mic / stop any playback
    sh.recogText=null; sh.recogSim=null; sh.showReading=false; sh.showThai=false;
    if(r==='again'){ const insertAt=Math.min(sh.queue.length, sh.pos+4); sh.queue.splice(insertAt,0,it); } // re-drill later
    sh.pos++;
    if(sh.pos>=sh.queue.length){ sh.pos=Math.max(0, sh.queue.length-1); } // clamp at end
    render();
  }

  // ---- optional AI auto-score via SpeechRecognition ----
  function normJa(s){ return String(s||'').replace(/[\s、。！？!?.,・「」『』（）()　]/g,''); }
  function lev(a,b){ const m=a.length,n=b.length; if(!m)return n; if(!n)return m; const d=[]; for(let i=0;i<=m;i++)d[i]=[i]; for(let j=0;j<=n;j++)d[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){ d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); } return d[m][n]; }
  function simRatio(said, ej, er){
    const s=normJa(said); let best=0;
    [normJa(ej), normJa(er)].forEach(c=>{ const L=Math.max(c.length, s.length)||1; const r=1-lev(s,c)/L; if(r>best)best=r; });
    return Math.round(Math.max(0,best)*100);
  }
  function aiListen(){
    if(!SR) return; const it=shadowCur(); if(!it) return;
    let r; try{ r=new SR(); }catch(e){ return; }
    r.lang='ja-JP'; r.interimResults=false; r.maxAlternatives=1;
    sh.recogText='กำลังฟัง...'; sh.recogSim=null; render();
    r.onresult=e=>{ const txt=(e.results[0][0].transcript)||''; sh.recogText=txt; sh.recogSim=simRatio(txt, it.ej, it.er); render(); };
    r.onerror=()=>{ sh.recogText='ฟังไม่สำเร็จ ลองใหม่'; sh.recogSim=null; render(); };
    r.onend=()=>{ if(sh.recogText==='กำลังฟัง...'){ sh.recogText='ไม่ได้ยินเสียง ลองใหม่'; render(); } };
    try{ r.start(); }catch(e){}
  }

  function viewShadow(){
    const it=shadowCur();
    const back=`<div id="sh-back" style="cursor:pointer;width:34px;height:34px;border-radius:11px;background:#fff;border:1px solid #f0eafa;display:flex;align-items:center;justify-content:center;font-size:16px;color:#8a83a0;flex-shrink:0;">✕</div>`;
    if(!it){ return `<div style="position:absolute;inset:0;padding:40px 22px;"><div style="display:flex;gap:12px;align-items:center;">${back}<div style="font-size:20px;font-weight:700;color:#443c54;">ชาโดวิง</div></div><div style="text-align:center;color:#a79fb6;margin-top:60px;">ไม่มีประโยคให้ฝึก</div></div>`; }
    const n=sh.queue.length, score=shadowScores[it.ej];
    const scoreTag = score? `<span style="font-size:11px;font-weight:700;color:#7c6bd6;background:#f2eefb;padding:3px 10px;border-radius:12px;">${score==='good'?'ดีมาก':score==='ok'?'พอใช้':'ลองใหม่'}</span>`:'';
    const readingLine = sh.showReading? `<div style="font-size:15px;color:#b0a8c2;margin-top:12px;line-height:1.7;letter-spacing:.5px;">${esc(it.er)}</div>`:'';
    const thaiLine = sh.showThai? `<div style="font-size:15px;color:#7a7290;margin-top:8px;line-height:1.7;">${esc(it.et)}</div>`:'';
    const recBtn = rec.on
      ? `<button id="sh-rec" style="cursor:pointer;border:none;flex:1;background:#ff6f9c;color:#fff;font-size:14px;font-weight:700;padding:13px;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;gap:6px;">■ หยุดอัด</button>`
      : `<button id="sh-rec" style="cursor:pointer;border:none;flex:1;background:#fff1f5;color:#ff6f9c;font-size:14px;font-weight:700;padding:13px;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;gap:6px;">🎙 อัดเสียง</button>`;
    const recogBlock = sh.recogText!=null? (function(){ const sim=sh.recogSim; const col= sim==null?'#a79fb6': sim>=80?'#34b183': sim>=55?'#e0a020':'#ff6f9c';
      return `<div style="background:#faf7ff;border:1px solid #f0eafa;border-radius:16px;padding:12px 14px;margin-bottom:14px;text-align:left;">
        <div style="font-size:11px;color:#b7afc6;font-weight:600;margin-bottom:4px;">AI ได้ยินว่า</div>
        <div style="font-size:16px;color:#3a3350;font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;">${esc(sh.recogText)}</div>
        ${sim!=null?`<div style="font-size:14px;font-weight:800;color:${col};margin-top:6px;">ความใกล้เคียง ${sim}%</div>`:''}
      </div>`; })() : '';
    return `<div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:36px 20px 20px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        ${back}
        <div style="flex:1;font-size:18px;font-weight:700;color:#443c54;">ชาโดวิง</div>
        <div style="font-size:12px;font-weight:700;color:#7c6bd6;">ประโยคที่ ${sh.pos+1} / ${n}</div>
      </div>
      <div class="scroll" style="flex:1;overflow-y:auto;">
        <div style="background:#fff;border:1px solid #f2edfb;border-radius:24px;padding:22px;box-shadow:0 16px 34px -24px rgba(124,107,214,.6);margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:11px;font-weight:700;color:#34b183;background:#eafaf3;padding:3px 11px;border-radius:20px;">ประโยค</span>${scoreTag}
          </div>
          <div style="font-size:24px;font-weight:600;color:#3a3350;line-height:1.7;font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;">${esc(it.ej)}</div>
          ${readingLine}${thaiLine}
          <div style="font-size:12px;color:#b7afc6;margin-top:14px;border-top:1px dashed #ece6f7;padding-top:10px;">จาก: <b style="color:#7c6bd6;">${esc(it.k)}</b> — ${esc(it.th)}</div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:14px;">
          <button id="sh-tr" style="cursor:pointer;border:none;flex:1;background:${sh.showReading?'#7c6bd6':'#f0ebfb'};color:${sh.showReading?'#fff':'#7c6bd6'};font-size:13px;font-weight:700;padding:11px;border-radius:14px;">${sh.showReading?'ซ่อน':'แสดง'}คำอ่าน</button>
          <button id="sh-th" style="cursor:pointer;border:none;flex:1;background:${sh.showThai?'#34b183':'#eafaf3'};color:${sh.showThai?'#fff':'#34b183'};font-size:13px;font-weight:700;padding:11px;border-radius:14px;">${sh.showThai?'ซ่อน':'แสดง'}คำแปล</button>
        </div>
        <div style="background:#faf7ff;border-radius:16px;padding:12px 14px;margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;"><span style="font-size:13px;font-weight:600;color:#443c54;">ความเร็วเสียง</span><span id="sh-rate-val" style="font-size:13px;font-weight:700;color:#7c6bd6;">${shadowRate.toFixed(2).replace(/0$/,'')}×</span></div>
          <input id="sh-rate" type="range" min="0.5" max="1.0" step="0.05" value="${shadowRate}" style="width:100%;margin-top:8px;">
        </div>
        <button id="sh-play" style="cursor:pointer;border:none;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#8a76e8,#b58fe6);color:#fff;font-size:16px;font-weight:700;padding:15px;border-radius:16px;box-shadow:0 14px 26px -16px rgba(138,118,232,.75);margin-bottom:12px;">${spk(18)} ฟัง</button>
        <div style="display:flex;gap:10px;margin-bottom:12px;">
          ${recBtn}
          <button id="sh-mine" ${rec.url?'':'disabled'} style="cursor:${rec.url?'pointer':'default'};border:none;flex:1;background:#f0ebfb;color:#7c6bd6;opacity:${rec.url?1:.5};font-size:14px;font-weight:700;padding:13px;border-radius:16px;">▶ เสียงฉัน</button>
          <button id="sh-cmp" ${rec.url?'':'disabled'} style="cursor:${rec.url?'pointer':'default'};border:none;flex:1;background:#eafaf3;color:#34b183;opacity:${rec.url?1:.5};font-size:14px;font-weight:700;padding:13px;border-radius:16px;">ฟังเทียบ</button>
        </div>
        ${SR?`<button id="sh-ai" style="cursor:pointer;border:none;width:100%;background:#fff;border:2px solid #eee6fb;color:#7c6bd6;font-size:14px;font-weight:700;padding:12px;border-radius:16px;margin-bottom:14px;">🤖 ให้ AI ฟัง</button>`:''}
        ${recogBlock}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button id="sh-again" style="cursor:pointer;border:none;flex:1;background:#fff1f5;color:#ff6f9c;font-size:14px;font-weight:700;padding:14px;border-radius:16px;">อีกครั้ง</button>
        <button id="sh-ok" style="cursor:pointer;border:none;flex:1;background:#fff7e8;color:#e0a020;font-size:14px;font-weight:700;padding:14px;border-radius:16px;">พอใช้</button>
        <button id="sh-good" style="cursor:pointer;border:none;flex:1;background:#eafaf3;color:#34b183;font-size:14px;font-weight:700;padding:14px;border-radius:16px;">ดีมาก</button>
      </div>
    </div>`;
  }

  // ---------- render + wiring ----------
  function render(){
    const app=$('app');
    if(st.screen==='home') app.innerHTML=viewHome();
    else if(st.screen==='decks') app.innerHTML=viewDecks();
    else if(st.screen==='study') app.innerHTML=viewStudy();
    else if(st.screen==='summary') app.innerHTML=viewSummary();
    else if(st.screen==='exam-level') app.innerHTML=viewExamLevel();
    else if(st.screen==='exam-setup') app.innerHTML=viewExamSetup();
    else if(st.screen==='exam-q') app.innerHTML=viewExamQ();
    else if(st.screen==='exam-result') app.innerHTML=viewExamResult();
    else if(st.screen==='shadow') app.innerHTML=viewShadow();
    wire();
  }
  function on(id,ev,fn){ const e=$(id); if(e) e.addEventListener(ev,fn); }
  function wire(){
    if(st.screen==='home'){
      on('gear','click',openSheet);
      on('cta','click',()=>go('decks'));
      on('seeall','click',()=>go('decks'));
      on('nav-exam','click',()=>go('exam-level'));
      on('nav-shadow','click',startShadow);
      document.querySelectorAll('.deck-row').forEach(el=>el.addEventListener('click',()=>startDeck(el.dataset.deck)));
    } else if(st.screen==='decks'){
      on('back','click',()=>go('home'));
      document.querySelectorAll('.deck-card').forEach(el=>el.addEventListener('click',()=>startDeck(el.dataset.deck)));
    } else if(st.screen==='study'){
      const w=curWord();
      on('close','click',()=>{ exiting=false; go('home'); });
      on('spk-word','click',()=>speak(w.k));
      on('spk-sent','click',()=>speak(w.ej));
      on('reveal','click',reveal);
      on('btn-dont','click',()=>fly(false));
      on('btn-know','click',()=>fly(true));
      bindCard();
    } else if(st.screen==='summary'){
      on('again','click',reviewAgain);
      on('finish','click',()=>go('home'));
      document.querySelectorAll('.rev-play').forEach(el=>el.addEventListener('click',()=>speak(WORDS[+el.dataset.i].k)));
    } else if(st.screen==='exam-level'){
      on('ex-back','click',()=>go('home'));
      document.querySelectorAll('.ex-lv').forEach(el=>el.addEventListener('click',()=>{ ex.lv=el.dataset.lv; go('exam-setup'); }));
    } else if(st.screen==='exam-setup'){
      on('ex-back','click',()=>go('exam-level'));
      document.querySelectorAll('.ex-opt').forEach(el=>el.addEventListener('click',()=>startExam(+el.dataset.n)));
    } else if(st.screen==='exam-q'){
      const q=ex.items[ex.pos];
      on('ex-close','click',()=>{ stopExamTimer(); cancelSeq(); go('home'); });
      on('ex-listen','click',()=>playListening(q));
      document.querySelectorAll('.ex-ch').forEach(el=>el.addEventListener('click',()=>selectChoice(+el.dataset.i)));
      on('ex-next','click',nextExam);
    } else if(st.screen==='exam-result'){
      on('ex-again','click',()=>go('exam-setup'));
      on('ex-home','click',()=>go('home'));
      document.querySelectorAll('.rev-listen').forEach(el=>el.addEventListener('click',()=>playListening(ex.items[+el.dataset.i])));
    } else if(st.screen==='shadow'){
      on('sh-back','click',()=>{ stopShadow(); go('home'); });
      on('sh-tr','click',()=>{ sh.showReading=!sh.showReading; render(); });
      on('sh-th','click',()=>{ sh.showThai=!sh.showThai; render(); });
      on('sh-play','click',()=>{ const it=shadowCur(); if(it) speak(it.ej,{rate:shadowRate}); });
      on('sh-rec','click',toggleRecord);
      on('sh-mine','click',playMine);
      on('sh-cmp','click',playCompare);
      on('sh-ai','click',aiListen);
      on('sh-again','click',()=>rateShadow('again'));
      on('sh-ok','click',()=>rateShadow('ok'));
      on('sh-good','click',()=>rateShadow('good'));
      const sr=$('sh-rate'); if(sr) sr.oninput=function(){ shadowRate=parseFloat(this.value); const v=$('sh-rate-val'); if(v) v.textContent=shadowRate.toFixed(2).replace(/0$/,'')+'×'; save('jpfc_shadow_rate',shadowRate); };
    }
  }

  if(!WORDS.length){ $('app').innerHTML='<div style="padding:40px;text-align:center;color:#a79fb6;">ไม่พบข้อมูลคำศัพท์ (words.js)</div>'; }
  else render();
})();
</script>
<script>
  // register the service worker for offline use (needs http(s), e.g. a host or localhost)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function (e) { console.warn('SW register failed', e); });
    });
  }
</script>
</body>
</html>
